spring.application.name=household_expenses

# AWS Cognito JWT Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.{region}.amazonaws.com/{userPoolId}

# CORS: 環境変数 CORS_ALLOWED_ORIGINS が設定されていれば上書き、なければ開発用デフォルト値を使用
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
